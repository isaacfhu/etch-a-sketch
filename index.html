<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Etch a Sketch</title>
  </head>
  <body>
    <h1>Etch-MY-Sketch</h1>
    <div class="top-bar">
      <button class="input-grid-size">Select Custom Grid Size</button>
      <button class="reset-grid-size">Reset</button>
      <button class="randomize-color">
        <span class="red">R</span><span class="orange">a</span
        ><span class="yellow">i</span><span class="green">n</span
        ><span class="blue">b</span><span class="indigo">o</span
        ><span class="violet">w</span> Mode
      </button>
    </div>
    <div class="grid"></div>
    <p>TIP: Click on any square to change it's transparency!</p>
    <h3>
      <a href="https://github.com/isaacfhu/etch-a-sketch">Link to repo</a>
    </h3>
  </body>
</html>
